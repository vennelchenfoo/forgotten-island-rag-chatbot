[theme]
base                  = "dark"
primaryColor          = "#c9a227"
backgroundColor       = "#070710"
secondaryBackgroundColor = "#0c0c1a"
textColor             = "#e8d5b7"
font                  = "serif"

[server]
# Increase timeout for the slow model cold-start on Streamlit Cloud
maxUploadSize         = 10
enableStaticServing   = false

[browser]
gatherUsageStats      = false
